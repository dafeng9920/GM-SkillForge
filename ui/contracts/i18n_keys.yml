# UI i18n Keys Contract - 文案映射合同
# SEEDS-P1-7: UI 文案映射合同（i18n_key）
# Job ID: L45-D5-SEEDS-P1-20260220-005

version: 1
description: |
  UI 文案映射合同，防止硬编码漂移。
  所有 UI 文案必须通过此合同映射，不得在代码中硬编码。

# ============================================================================
# Gate Titles (8 Gates)
# ============================================================================
gates:
  intake_repo:
    title:
      en: "Repository Intake"
      zh: "仓库接入"
    description:
      en: "Intake and validate repository structure"
      zh: "接入并验证仓库结构"

  license_gate:
    title:
      en: "License Check"
      zh: "许可证检查"
    description:
      en: "Verify license compatibility"
      zh: "验证许可证兼容性"

  repo_scan_fit_score:
    title:
      en: "Repository Scan"
      zh: "仓库扫描"
    description:
      en: "Scan repository for fit score"
      zh: "扫描仓库计算适配分数"

  draft_skill_spec:
    title:
      en: "Draft Skill Spec"
      zh: "起草技能规范"
    description:
      en: "Generate skill specification draft"
      zh: "生成技能规范草稿"

  constitution_risk_gate:
    title:
      en: "Constitution Risk Gate"
      zh: "宪法风险门禁"
    description:
      en: "Check constitutional compliance"
      zh: "检查宪法合规性"

  scaffold_skill_impl:
    title:
      en: "Scaffold Implementation"
      zh: "脚手架实现"
    description:
      en: "Scaffold skill implementation"
      zh: "生成技能实现脚手架"

  sandbox_test_and_trace:
    title:
      en: "Sandbox Test"
      zh: "沙盒测试"
    description:
      en: "Run sandbox tests and trace"
      zh: "运行沙盒测试并追踪"

  pack_audit_and_publish:
    title:
      en: "Pack & Publish"
      zh: "打包与发布"
    description:
      en: "Pack skill and publish to registry"
      zh: "打包技能并发布到注册表"

# ============================================================================
# Error Messages
# ============================================================================
errors:
  fallback:
    title:
      en: "Error"
      zh: "错误"
    message:
      en: "An unexpected error occurred. Please try again."
      zh: "发生意外错误，请重试。"
  validation:
    title:
      en: "Validation Error"
      zh: "验证错误"
    message:
      en: "Input validation failed."
      zh: "输入验证失败。"
  permission:
    title:
      en: "Permission Denied"
      zh: "权限不足"
    message:
      en: "You do not have permission to perform this action."
      zh: "您没有执行此操作的权限。"
  not_found:
    title:
      en: "Not Found"
      zh: "未找到"
    message:
      en: "The requested resource was not found."
      zh: "未找到请求的资源。"

