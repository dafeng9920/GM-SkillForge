# SEEDS Governance CI Workflow
# T28: CI 强制门 - 将 P0/P1 seed 校验接入 pre-merge 与 nightly
#
# Job ID: L45-D6-SEEDS-P2-20260220-006
# Contract: docs/SEEDS_v0.md

name: SEEDS Governance

on:
  # Pre-merge: Run on pull requests to main
  pull_request:
    branches: [main]
    paths:
      - 'skillforge/**'
      - 'registry/**'
      - 'logs/**'
      - 'orchestration/**'
      - 'security/**'
      - 'regression/**'
      - 'ui/**'
      - 'templates/**'
      - 'scripts/validate_seeds_p0_p1.py'

  # Nightly: Run every night at 2:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      strict:
        description: 'Strict mode (fail on any error)'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  JOB_ID: 'L45-D6-SEEDS-P2-20260220-006'

jobs:
  validate-seeds:
    name: Validate P0/P1 Seeds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml jsonschema

      - name: Create required directories
        run: |
          mkdir -p registry logs orchestration security regression/cases ui/contracts templates

      - name: Validate P0/P1 Seeds (strict mode)
        id: validate
        run: |
          echo "=== SEEDS Governance Check ==="
          echo "Job ID: ${{ env.JOB_ID }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Event: ${{ github.event_name }}"
          echo ""

          python scripts/validate_seeds_p0_p1.py --strict --json > validation_result.json
          exit_code=$?

          echo "=== Validation Result ==="
          cat validation_result.json

          exit $exit_code

      - name: Upload validation result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seeds-validation-result
          path: validation_result.json
          retention-days: 30

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result;
            try {
              result = JSON.parse(fs.readFileSync('validation_result.json', 'utf8'));
            } catch (e) {
              result = { overall_passed: false, message: 'Validation failed to run' };
            }

            const status = result.overall_passed ? '✅ PASSED' : '❌ FAILED';
            const body = `## SEEDS Governance Check ${status}

            - **Job ID**: ${result.job_id}
            - **Strict Mode**: ${result.strict_mode}
            - **Total Checks**: ${result.total_checks}
            - **Passed**: ${result.passed_checks}
            - **Failed**: ${result.failed_checks}

            ${result.overall_passed ?
              'All P0/P1 seeds validated successfully.' :
              'One or more seed validations failed. Please review the logs.'}
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Summary job
  seeds-summary:
    name: Seeds Summary
    runs-on: ubuntu-latest
    needs: validate-seeds
    if: always()

    steps:
      - name: Summary
        run: |
          echo "### SEEDS Governance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Job ID**: ${{ env.JOB_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Result**: ${{ needs.validate-seeds.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Check result
        if: needs.validate-seeds.result != 'success'
        run: |
          echo "SEEDS validation failed!"
          exit 1
