schema_version: "0.1.0"
skill_id: "intent_parse"
name: "Intent Parser"
description: "Parses natural language into structured intent"
version: "0.1.0"

# 所属路径
paths: ["A", "AB"]
stage: -1

# 输入合同
input:
  required:
    - natural_language:
        type: "string"
        description: "Natural language skill description"
    - options:
        type: "object"
        description: "Pipeline options"

# 输出合同
output:
  required:
    - schema_version:
        type: "string"
        description: "Schema version (0.1.0)"
    - intent:
        type: "object"
        description: "Structured intent with goal, domain, actions, constraints, target_environment, intended_use"
    - confidence:
        type: "number"
        description: "Confidence score (0.0 - 1.0)"
    - raw_input:
        type: "string"
        description: "Original natural language input"

# 能力声明
capabilities:
  network: false
  filesystem: false
  subprocess: false
  gpu: false

# 风险等级
risk_tier: "L0"

# 依赖
dependencies:
  adapters: []
  schemas: ["intent"]
  error_codes: []

# 错误处理
errors:
  - code: "INTENT_PARSE_FAILED"
    retryable: false
    description: "Failed to parse natural language intent"