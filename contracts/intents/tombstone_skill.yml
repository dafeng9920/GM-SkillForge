      lines: "13-17"
      evidence_ref: "3DRAG-TOMBSTONE-L13-17"

# ============================================================
# Error Codes
# ============================================================
error_codes:
  - code: "TOMB-E001"
    description: "Skill ID 不存在或格式无效"
  - code: "TOMB-E002"
    description: "废弃原因不满足最小长度要求"
  - code: "TOMB-E003"
    description: "技能已被废弃（重复废弃请求）"
  - code: "TOMB-E004"
    description: "审计链写入失败"
  - code: "TOMB-E005"
    description: "尝试恢复已废弃技能（违规操作）"

