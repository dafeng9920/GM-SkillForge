delta_info_structure:
  description: "The delta_info object structure added to SkillComposer output"
  schema:
    is_incremental: "boolean - True if updating existing skill"
    base_version: "string | None - Version being updated from"
    version_bump: "major | minor | patch | None - Type of version change"
    change_type: "new | update | subskill - Classification of change"
    parent_skill: "string | None - Parent skill name for sub-skills"

updated_graph_structure:
  description: "The updated_graph object structure added to PackPublish output"
  schema:
    skill_id: "string - Skill identifier"
    version: "string - New version"
    nodes_added: "list[string] - New nodes in graph"
    nodes_modified: "list[string] - Modified nodes"
    edges_added: "list[dict] - New edges (from, to, type)"
    parent_ref: "string | None - Parent skill reference"
    graph_hash: "string - SHA256 of graph content"
    is_incremental: "boolean - Whether this is an incremental update"
    change_type: "new | update | subskill"

release_manifest_structure:
  description: "The release_manifest object structure added to PackPublish output"
  schema:
    release_id: "string - Unique release identifier"
    skill_id: "string - Skill identifier"
    version: "string - Release version"
    previous_version: "string | None - Previous version for rollback"
    change_type: "new | update | subskill"
    rollback:
      supported: "boolean - Whether rollback is supported"
      rollback_version: "string | None - Target version for rollback"
      rollback_path: "string | None - URL path for rollback"
    artifacts: "list[string] - List of L3 artifact files"
    published_at: "string - ISO timestamp"
    delta_summary: "dict | None - Summary for incremental updates"

