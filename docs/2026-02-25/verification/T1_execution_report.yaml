root_cause_analysis:
  problem: "killer test A 失败：gate_decisions=[] 且无顶层 ruling"
  cause: |
    CLI 的 _create_engine() 只注册了 node handlers，但没有设置 gate_evaluator。
    当 gate_evaluator is None 时，gate 节点作为普通节点处理，结果被存储到
    artifacts[node_id] 而不是 gate_decisions 列表中。
  location: "engine.py:258-296 (original)"
  fix: |
    修改 gate 节点处理逻辑：当 gate_evaluator 为 None 时，直接调用
    handler.execute() 并将结果添加到 gate_decisions 列表。

