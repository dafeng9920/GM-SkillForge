files_modified:
  - path: "skillforge-spec-pack/skillforge/src/orchestration/engine.py"
    critical_fix:
      description: "Fix gate node handling when gate_evaluator is None"
      location: "Lines 258-296"
      before: |
        if node_id in GATE_NODES and self.gate_evaluator is not None:
            gate_decision = self.gate_evaluator.evaluate(node_id, artifacts)
            gate_decisions.append(gate_decision)
            ...
        else:
            # regular node (or gate without evaluator)
            ...
      after: |
        if node_id in GATE_NODES:
            if self.gate_evaluator is not None:
                gate_decision = self.gate_evaluator.evaluate(node_id, artifacts)
            else:
                # Fallback: call handler.execute() directly for gate nodes
                gate_decision = handler.execute(artifacts)

            gate_decisions.append(gate_decision)
            artifacts[node_id] = gate_decision
            ...
        else:
            # regular node
            ...
      evidence_ref: "engine.py:258-296"

  - path: "skillforge-spec-pack/skillforge/src/nodes/constitution_gate.py"
