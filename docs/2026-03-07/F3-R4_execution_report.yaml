remediation_details:

  # F3-R4: Semantic Demotion - Terminology Unification

  ## Root Cause Analysis
  原问题：F3-R3 试图证明"证据先于决策"的时序关系，但这与当前架构不符

  实际架构流程：
  1. Gate decision happens (with timestamp)
  2. Evidence collection records the decision (evidence created_at = timestamp)
  3. Publish decision is made

  因此"evidence-first"在字面意义上是误导的 - evidence 并不是在 decision 之前创建，
  而是在 decision 之后记录 decision。

  ## Terminology Unification

  Old (misleading): "evidence-first publish chain"
  New (accurate): "decision-evidence traceability"

  Definition: Gate decision timestamps are preserved in evidence chain for traceability.

  ## Changes Made

  ### test_t2_f3_replay_parity.py
  - Line 12: "Evidence is collected BEFORE publish decisions"
    -> "Evidence records gate decisions with timestamps for traceability"

  - Line 238: "Test 2: Evidence-First Publish Chain"
    -> "Test 2: Decision-Evidence Traceability (historically 'evidence-first')"

  - Line 239-244: Class docstring
    -> Updated to reflect actual verification: gate decision timestamps preserved,
       evidence traces back to decisions, evidence in publish output

  - Line 795: evidence_refs description
    -> "Tests for decision-evidence traceability"

  ### F3-R_execution_report.yaml (updated version)
  - CV-F3-003 section: Removed false claim "evidence-first 成为可验证的时间顺序语义"
  - completion_definition: Removed false claim, updated to honest assessment

  ### F3-R_COMPLETION_RECORD.md (updated version)
  - CV-F3-003 Before/After: Updated to honest description

