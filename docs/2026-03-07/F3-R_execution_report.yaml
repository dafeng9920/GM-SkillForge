  evidence_ref: "test_t2_f3_replay_parity.py:200-290"

  # CV-F3-002: INCOMPLETE_EVIDENCE_CHAIN - FIXED
  violation: "Gate decision timestamp 未被保存到 evidence 中，导致无法追溯决策时间"
  fix:
    - 修改 pack_publish.py 中的 _add_evidence 调用
    - 为 license_gate evidence 添加 "decision_time" 字段
    - 为 constitution_gate evidence 添加 "decision_time" 字段
    - 为 integrity_gate evidence 添加 "decision_time" 字段
  code_location: "pack_publish.py:398-420"
  evidence_ref: "pack_publish.py:403, 408, 419"

  # CV-F3-003: SEMANTIC_DRIFT - FIXED
  violation: "'evidence-first publish chain' 的语义在测试中被简化为'evidence exists'"
  fix:
    - 修正 test_evidence_collected_before_publish_decision 的文档字符串
    - 明确说明测试验证 "Gate decision timestamps are saved to evidence"
    - 测试现在验证 decision_time 字段存在且匹配输入
  evidence_ref: "test_t2_f3_replay_parity.py:200-216"

  # CV-F3-004: WEAK_FAIL_CLOSED_GUARANTEE - PARTIALLY FIXED
  violation: "Constitutional default-deny 测试只验证了表面路径，未验证 fail-closed 边界的完整性"
  fix:
    - 添加 test_malicious_intent_empty_string: 空字符串不触发误报
    - 添加 test_malicious_intent_multiple_patterns: 多个恶意 pattern 同时匹配
    - 添加 test_malicious_intent_special_characters: 特殊字符无法绕过
