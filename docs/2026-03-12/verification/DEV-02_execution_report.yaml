notes: |
  本次实现严格遵循以下原则：

  1. 结论优先 - DecisionSummaryCard 在页面顶部首先展示裁决结果
  2. 概念分离 - Evidence/Rule/Gate/Gap 使用独立组件，视觉上清晰分离
  3. 权限裁剪 - 类型定义明确排除 Layer 3 字段（threshold/weight/probe_code/internal_topology）
  4. 红线强化 - Red Lines 与 Fixable Gaps 左右分栏，视觉权重不同
  5. 证据分级 - EvidenceRef 实现了 visible/summary-only/restricted 三种可见性级别
  6. 三权分立 - PowerBoundaryCard 显式展示 Execution/Audit/Compliance 权力边界
  7. Hash 绑定 - HashReproducibilityCard 显示 demand/contract/decision hashes
  8. 禁用词避免 - StatusLabel 不使用 Success/Done/Approved/Live

  后续工作：
  - DEV-05 将抽取共享组件（StatusLabel, HashDisplay, PowerBoundaryCard 等）
  - DEV-06 将实现 API 层裁剪与 Never-in-DOM 守卫
  - 需替换 mockAuditData 和 mockEvidenceRefs 为真实 API 调用

