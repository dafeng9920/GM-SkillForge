# Envelope 结构说明
envelope_structure:
  header:
    required_fields:
      - "envelope_id"
      - "schema_version"
      - "created_at"
      - "node_id"
      - "body_hash"
    optional_fields:
      - "body_encoding"
      - "compression"
      - "expires_at"
      - "nonce"
      - "trace_id"

  keywrap:
    algorithm: "RSA-OAEP-256"
    required_fields:
      - "encrypted_dek"
      - "key_id"

  ciphertext:
    algorithm: "AES-256-GCM"
    required_fields:
      - "iv"
      - "data"
      - "tag"

  signature:
    algorithm: "Ed25519"
    required_fields:
      - "value"
      - "signed_fields"

  cert:
    algorithm: "Ed25519"
    required_fields:
      - "node_id"
      - "public_key"

