# 数据流转验证
data_flow:
  step_1_diagnosis_input:
    module: "skillforge.src.diagnosis"
    input_file: "sample_diagnosis.json"
    class: "DiagnosisOutput"
    key_fields:
      - diagnosis_id
      - skill_id
      - skill_name
      - health_score
      - evidence_refs

  step_2_diagnosis_to_aev:
    module: "skillforge.src.economics"
    class: "AEVBuilder"
    method: "with_skill(diagnosis_id)"
    data_transfer:
      - from: "diagnosis.diagnosis_id"
        to: "aev.diagnosis_id"
      - from: "diagnosis.skill_id"
        to: "aev.skill_id"
      - from: "diagnosis.skill_name"
        to: "aev.skill_name"
      - from: "diagnosis.health_score"
        to: "aev.metadata.diagnosis_health_score"

  step_3_aev_output:
    module: "skillforge.src.economics"
    class: "AEVOutput"
    output_file: "l4_06_aev_output.json"
    key_fields:
      - aev_id
      - diagnosis_id
      - skill_id
      - aev_total
      - components
      - confidence_interval
      - evidence_refs

