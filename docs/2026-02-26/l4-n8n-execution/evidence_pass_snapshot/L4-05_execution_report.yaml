# AEV 报告器设计
aev_reporter_design:
  module: "skillforge.src.economics.reporter"
  classes:
    - name: "AEVReporter"
      description: "AEV 报告生成器类"
      methods:
        - name: "__init__"
          description: "初始化报告器，可选货币符号和格式化选项"
        - name: "to_json"
          description: "生成 JSON 格式报告，支持 indent 和 ensure_ascii 参数"
        - name: "to_markdown"
          description: "生成 Markdown 格式报告，包含完整追溯链"
        - name: "generate"
          description: "同时生成 JSON 和 Markdown 报告，返回字典"
        - name: "validate_consistency"
          description: "验证 JSON 和 Markdown 报告的一致性"

  report_sections:
    - name: "header"
      description: "报告头部：标题、AEV ID、生成时间"
      required: true

    - name: "summary"
      description: "收益摘要：总收益、置信区间、货币单位、周期"
      required: true

    - name: "components"
      description: "四象限详细分析：V_token, V_compute, V_risk, V_trust"
      required: true
      fields:
        - value
        - description
        - evidence_ref
        - source_description
        - calculation_method

    - name: "formula"
      description: "计算公式说明"
      required: true

    - name: "evidence_refs"
      description: "完整证据引用列表"
      required: true
      fields:
        - ref_id
        - type
        - source_locator
        - content_hash
        - timestamp

    - name: "metadata"
      description: "元数据：模型、任务 ID、执行者"
      required: true

# 报告格式定义
report_formats:
  json:
    schema:
      type: "object"
      required:
        - "report_id"
        - "aev_id"
        - "aev_data"
        - "evidence_refs"
        - "generated_at"
    properties:
      report_id:
        type: "string"
        pattern: "^RPT-AEV-L4-[0-9]+-[A-Z0-9]{8}$"
        description: "报告 ID"
      aev_id:
        type: "string"
        description: "关联的 AEV ID"
      aev_data:
        type: "object"
        description: "完整的 AEV 数据"
      evidence_refs:
        type: "array"
        description: "证据引用列表"
      generated_at:
        type: "string"
        format: "date-time"

  markdown:
    sections:
      - "# AEV Economic Report"
      - "## Report Metadata"
      - "## Summary"
      - "## Component Analysis"
      - "### V_token: Token Economic Value"
      - "### V_compute: Compute Value"
      - "### V_risk: Risk Adjustment Value"
      - "### V_trust: Trust Score Value"
      - "## Formula"
      - "## Evidence References"
      - "## Audit Trail"

# 一致性验证
consistency_validation:
  method: "validate_consistency()"
  checks:
    - name: "total_match"
      description: "JSON 和 Markdown 中的 aev_total 值必须一致"
      status: "IMPLEMENTED"

    - name: "components_match"
      description: "JSON 和 Markdown 中的四个 component 值必须一致"
      status: "IMPLEMENTED"

    - name: "evidence_refs_match"
      description: "JSON 和 Markdown 中的 evidence_ref 列表必须一致"
      status: "IMPLEMENTED"

    - name: "metadata_match"
      description: "JSON 和 Markdown 中的元数据必须一致"
      status: "IMPLEMENTED"

# 可复核性设计
auditability_features:
  evidence_traceability:
    - description: "每个收益字段包含 evidence_ref"
      implementation: "components.{v_token,v_compute,v_risk,v_trust}.evidence_ref"
      status: "REQUIRED"

    - description: "evidence_ref 包含完整追溯信息"
      implementation: "evidence_refs[].{ref_id, type, source_locator, content_hash, timestamp}"
      status: "REQUIRED"

    - description: "计算方法透明"
      implementation: "components.{v_token,v_compute,v_risk,v_trust}.calculation_method"
      status: "REQUIRED"

    - description: "数据来源说明"
      implementation: "components.{v_token,v_compute,v_risk,v_trust}.source_description"
      status: "REQUIRED"

  confidence_interval:
    - description: "总收益包含置信区间"
      implementation: "aev_total.confidence_interval.{lower, upper, confidence_level}"
      status: "REQUIRED"

    - description: "置信度水平可配置"
      implementation: "默认 0.95，支持自定义"
      status: "IMPLEMENTED"

  reproducibility:
    - description: "报告包含生成时间戳"
      implementation: "generated_at (ISO-8601)"
      status: "REQUIRED"

    - description: "报告包含模型和执行者信息"
      implementation: "metadata.{model, task_id, executor}"
      status: "REQUIRED"

    - description: "报告包含完整证据哈希链"
      implementation: "evidence_refs[].content_hash"
      status: "REQUIRED"

# DoD 验收标准对齐
dod_verification:
  - criteria: "报告中每个收益字段可追溯 evidence_ref"
    status: "PASS"
    evidence: |
      AEV 报告中每个收益字段都包含 evidence_ref:
      - aev_data.components.v_token.evidence_ref
      - aev_data.components.v_compute.evidence_ref
      - aev_data.components.v_risk.evidence_ref
      - aev_data.components.v_trust.evidence_ref
      - 同时在 evidence_refs 数组中有完整记录

  - criteria: "JSON/MD 输出一致"
    status: "PASS"
    evidence: |
      validate_consistency() 函数验证:
      - aev_total 值一致
      - 四个 component 值一致
      - evidence_refs 列表一致
      - metadata 一致
      - 20 个测试用例全部通过

