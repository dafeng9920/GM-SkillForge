# Smoke Tests 实现
smoke_tests:
  total_tests: 5
  tests:
    - name: "Diagnosis module loads"
      description: "Test Diagnosis module import and sample data loading"
      validates:
        - "sample_diagnosis.json exists"
        - "DiagnosisOutput.from_dict() works"
        - "Required fields populated"
        - "diagnosis_id format: DX-L4-XXX-XXXXXXXX"

    - name: "AEV builder creates valid output"
      description: "Test AEVBuilder creates valid AEVOutput"
      validates:
        - "AEVBuilder API works"
        - "All 4 components set"
        - "aev_total > 0"
        - "aev_id format: AEV-L4-XXX-XXXXXXXX"

    - name: "Diagnosis -> AEV chain"
      description: "Test full chain with ID propagation"
      validates:
        - "diagnosis_id propagated to AEV"
        - "skill_id propagated to AEV"

    - name: "Evidence refs present"
      description: "Test Diagnosis and AEV have valid evidence_refs"
      validates:
        - "Diagnosis.evidence_refs populated"
        - "Each ref has id, kind, locator"

    - name: "AEV total calculation"
      description: "Test AEV total equals sum of components"
      validates:
        - "aev_total = v_token + v_compute + v_risk + v_trust"

# CI Integration
ci_integration:
  workflow_file: ".github/workflows/ci.yml"
  job_name: "l4-smoke-gate"
  timeout_minutes: 10
  needs: ["contract-tests"]
  steps:
    - "Set up Python 3.11"
    - "Install skillforge dependencies"
    - "Run: python scripts/run_l4_smoke.py"
    - "Upload smoke reports artifact"

  fail_closed_behavior:
    - "Script exits 1 on any test failure"
    - "final-gate checks l4-smoke-gate result"
    - "Failed smoke gate → CI failure → merge blocked"

