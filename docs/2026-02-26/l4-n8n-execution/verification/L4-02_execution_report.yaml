# === 五段式编排映射 ===
five_stage_mapping:
  description: "现有API完全支持五段式编排语义"

  stages:
    - stage: "trigger"
      api_endpoint: "POST /api/v1/n8n/run_intent"
      mapping_logic: "请求成功即点亮trigger阶段"
      response_fields:
        - "run_id"
        - "status"
        - "boundary_validated"
      evidence_ref: "EV-L4-02-101"

    - stage: "collect"
      api_endpoint: "POST /api/v1/n8n/fetch_pack"
      mapping_logic: "拿到pack和replay_pointer即完成collect阶段"
      response_fields:
        - "pack"
        - "replay_pointer"
        - "fetched_at"
      evidence_ref: "EV-L4-02-102"

    - stage: "process"
      api_endpoint: "POST /api/v1/n8n/query_rag"
      mapping_logic: "有RAG结果或结构化错误即完成process阶段"
      response_fields:
        - "results[]"
        - "replay_pointer"
        - "generated_at"
      evidence_ref: "EV-L4-02-103"

    - stage: "deliver"
      api_endpoint: "所有gate决策相关端点"
      mapping_logic: "gate_decision=ALLOW绿灯，其它红/橙"
      response_fields:
        - "gate_decision"
        - "release_allowed"
        - "permit_id"
      evidence_ref: "EV-L4-02-104"

    - stage: "report"
      api_endpoint: "所有端点的输出信封"
      mapping_logic: "形成可追溯报告卡（run_id+evidence_ref）"
      response_fields:
        - "run_id"
        - "evidence_ref"
        - "data"
      evidence_ref: "EV-L4-02-105"

# === 三张卡片映射 ===
three_cards_mapping:
  description: "前端展示层直接使用后端响应数据"

  cards:
    - card: "understanding"
      data_source: "run_intent输入摘要"
      backend_fields:
        - field: "repo_url"
          source: "RunIntentRequest.repo_url"
        - field: "commit_sha"
          source: "RunIntentRequest.commit_sha"
        - field: "at_time"
          source: "RunIntentRequest.at_time"
        - field: "intent_id"
          source: "RunIntentRequest.intent_id"
        - field: "requester_id"
          source: "RunIntentRequest.requester_id"
      evidence_ref: "EV-L4-02-201"

    - card: "plan"
      data_source: "pack+rag+决策摘要"
      backend_fields:
        - field: "replay_pointer"
          source: "fetch_pack.response.replay_pointer"
        - field: "rag_results"
          source: "query_rag.response.data.results"
        - field: "pack_summary"
          source: "fetch_pack.response.data"
      evidence_ref: "EV-L4-02-202"

    - card: "execution_contract"
      data_source: "permit/error字段"
      backend_fields:
        - field: "permit_id"
          source: "run_intent.response.data.permit_id"
        - field: "validation_timestamp"
          source: "run_intent.response.data.validation_timestamp"
        - field: "error_code"
          source: "error_envelope.error_code"
        - field: "blocked_by"
          source: "error_envelope.blocked_by"
        - field: "next_action"
          source: "error_envelope.message"
      evidence_ref: "EV-L4-02-203"

# === NL -> System 链路验证 ===
nl_to_system_chain:
  description: "验证NL输入到System执行的唯一主路径"

  chain_steps:
    - step: 1
      name: "NL输入接收"
      api: "POST /api/v1/n8n/run_intent"
      input_fields:
        - "repo_url"
        - "commit_sha"
        - "at_time"
        - "intent_id"
        - "requester_id"
      evidence_ref: "EV-L4-02-301"

    - step: 2
      name: "五段式编排"
      execution_order:
        - "trigger: run_intent调用"
        - "collect: fetch_pack获取"
        - "process: query_rag查询"
        - "deliver: gate_decision决策"
        - "report: run_id+evidence_ref输出"
      evidence_ref: "EV-L4-02-302"

    - step: 3
      name: "三卡片生成"
      card_order:
        - "understanding: 输入摘要"
        - "plan: 查询与决策"
        - "execution_contract: 执行结果"
      evidence_ref: "EV-L4-02-303"

    - step: 4
      name: "System执行"
      final_output:
        - "gate_decision: ALLOW/BLOCK"
        - "release_allowed: true/false"
        - "run_id: 执行标识"
        - "evidence_ref: 证据引用"
      evidence_ref: "EV-L4-02-304"

# === 链路证明 ===
chain_proof:
  proof_statement: "NL输入 -> 五段式结果 -> 三卡片 -> System执行"

  end_to_end_flow:
    - phase: "输入"
      component: "n8n webhook"
      output: "RunIntentRequest"
      evidence_ref: "EV-L4-02-401"

    - phase: "五段式编排"
      component: "n8n_orchestration.py"
      stages:
        - "trigger: generate_run_id()"
        - "collect: fetch_pack()"
        - "process: query_rag()"
        - "deliver: GatePermit.execute()"
        - "report: return N8NSuccessEnvelope"
      evidence_ref: "EV-L4-02-402"

    - phase: "三卡片数据"
      component: "前端响应映射"
      cards:
        - "understanding: 来自request输入"
        - "plan: 来自fetch_pack+query_rag输出"
