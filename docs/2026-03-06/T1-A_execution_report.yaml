### 1. skillforge-spec-pack/skillforge/src/storage/schema.py
**Location**: Line 126-129
**Changes**:
- Added `timeout=30` parameter to `sqlite3.connect()`
- Added `PRAGMA busy_timeout=5000` (5 second busy timeout)
- Added `PRAGMA synchronous=NORMAL` (balanced performance/safety)

**Before**:
```python
conn = sqlite3.connect(str(db_path))
conn.row_factory = sqlite3.Row
conn.execute("PRAGMA journal_mode=WAL")
conn.execute("PRAGMA foreign_keys=ON")
```

**After**:
```python
conn = sqlite3.connect(str(db_path), timeout=30)
conn.row_factory = sqlite3.Row
conn.execute("PRAGMA journal_mode=WAL")
conn.execute("PRAGMA busy_timeout=5000")
conn.execute("PRAGMA synchronous=NORMAL")
conn.execute("PRAGMA foreign_keys=ON")
```

### 2. gm_plugin_core_seed/src/services/orchestration/store_sqlite.py
**Location**: Line 206-221
**Changes**:
- Added `_connect()` method with centralized connection handling
- All `sqlite3.connect(self.db_path)` calls replaced with `self._connect()`
- Updated `_ensure_db_exists()` initialization to use WAL mode

**New Method**:
```python
def _connect(self):
    """
    Centralized SQLite connection factory with concurrency protection.

    Enforces:
    - WAL mode for better read/write concurrency
    - busy_timeout=5000ms to handle concurrent access
    - timeout=30s on connection
    """
    conn = sqlite3.connect(self.db_path, timeout=30)
    conn.execute("PRAGMA journal_mode=WAL")
    conn.execute("PRAGMA busy_timeout=5000")
    conn.execute("PRAGMA synchronous=NORMAL")
    return conn
```

