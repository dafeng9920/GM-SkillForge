# 统一验证门摘要
unified_gate_summary:
  entry_point: "scripts/unified_validation_gate.py"
  modes_supported: 4

  modes:
    - name: "mainline"
      description: "完整主线验证 (AG-2 + N-Boundary可选)"
      usage: "python scripts/unified_validation_gate.py --mainline --permit <permit>"

    - name: "cloud"
      description: "云端任务验证"
      usage: "python scripts/unified_validation_gate.py --cloud --task-id <task-id>"

    - name: "quick"
      description: "快速开发迭代 (跳过三哈希)"
      usage: "python scripts/unified_validation_gate.py --quick --permit <permit>"

    - name: "absorb"
      description: "Absorb 门禁"
      usage: "python scripts/unified_validation_gate.py --absorb --task-id <task-id>"

  output_format: "JSON"
  output_location: "docs/{date}/verification/unified_validation_{mode}_{timestamp}.json"

# 纳入主线的验证项
included_checks:
  ag2_core:
    - name: "Permit 五字段校验"
      script: "validate_permit_binding.py"
      integrated_via: "antigravity_2_guard.py"
      fields:
        - "demand_hash"
        - "contract_hash"
        - "decision_hash"
        - "audit_pack_hash"
        - "revision"

    - name: "Delivery 六件套校验"
      script: "validate_delivery_completeness.py"
      integrated_via: "antigravity_2_guard.py"
      items:
        - "Blueprint (contracts/dsl/*.yml)"
        - "Skill (skills/*)"
        - "n8n (workflows/**/*.json)"
        - "Evidence (artifacts/*)"
        - "AuditPack (audit_pack/*.json)"
        - "Permit (permits/*/*.json)"

    - name: "三哈希一致性校验"
      script: "validate_three_hashes.py"
      integrated_via: "antigravity_2_guard.py"
      hashes:
        - "demand_hash"
        - "contract_hash"
        - "decision_hash"

    - name: "固定口径绑定校验"
      script: "antigravity_2_guard.py (内置)"
      description: "禁止跨批次混用，验证 orchestration/fixed_caliber_binding.yml"

  n_boundary:
    - name: "N1 命令白名单"
      script: "verify_n1_command_allowlist.py"
      boundary: "命令必须存在于 allowlist 中"

    - name: "N2 工件完整性"
      script: "verify_n2_artifact_completeness.py"
      boundary: "必须返回 4 工件 (receipt, stdout, stderr, audit)"

    - name: "N3 时间窗口"
      script: "verify_n3_time_window.py"
      boundary: "执行时长和命令数限制"

  other:
    - name: "Receipt 验证"
      script: "verify_execution_receipt.py"
      mode: "cloud"

    - name: "Absorb 门禁"
      script: "pre_absorb_check.sh"
      mode: "absorb"

# 保留为旁路的验证项
excluded_checks:
  standalone:
    - name: "Evidence Chain"
      script: "verify_evidence_chain.py"
      reason: "可选审计链工具，不属主线必需"
      status: "保留独立使用"

  superseded:
    - name: "Dual Gate Wrapper"
      script: "verify_and_gate.py"
      reason: "功能已合并入统一门"
      status: "被替代"

    - name: "Three-Hash Permit Guard"
      script: "three-hash-permit-guard/run_guard.py"
      reason: "功能已合并入 antigravity_2_guard.py"
      status: "被替代"

  legacy:
    - name: "Phase Validators"
      scripts:
        - "validate_phase1.py"
        - "validate_phase2.py"
        - "validate_phase3_4.py"
        - "validate_phase5.py"
      reason: "历史阶段验证器"
      status: "保留供参考"

  specialized:
    - name: "Iteration Artifact Validator"
      script: "validate_iteration_artifacts.py"
      reason: "特殊用途工具"
      status: "独立使用"

