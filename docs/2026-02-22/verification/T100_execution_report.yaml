## Implementation Details

implementation:
  - id: IC-T100-001
    description: "Dual-Window Interaction Model"
    status: COMPLETED
    details: |
      Dual-window model implemented with clear separation:

      DIVERGENCE WINDOW (发散窗口):
      - Purpose: Exploration, suggestions, translations
      - Allowed: Suggest approaches, translate requirements, clarify intent
      - Prohibited: Execute system commands, modify files, make network calls
      - Output: Suggestions only (no system state changes)

      EXECUTION WINDOW (执行窗口):
      - Purpose: System actions with validated intent
      - Preconditions: Intent validated, compliance PASS, evidence chain ready
      - Allowed: Execute approved commands, modify allowed files, generate artifacts
      - Output: Execution results with EvidenceRef
    file: ".agents/skills/governance_protocol/SKILL.md"
    sha256: "sha256:726c6f13bc32cb33aa1aaaf711114911c2f61c522e7a64d1b59f848604345498"

  - id: IC-T100-002
    description: "Intent Validation Criteria"
    status: COMPLETED
    details: |
      BUILDABLE CRITERIA (must all be satisfied):
      1. Inputs are specified and accessible
      2. Outputs are defined and achievable
      3. Controls are within bounds
      4. Acceptance tests are verifiable
      5. No constitutional violations

      NOT BUILDABLE INDICATORS (triggers DENY):
      1. Missing required fields
      2. Contradictory requirements
      3. Out of scope requests
      4. Constitutional violations
      5. Insufficient context

  - id: IC-T100-003
    description: "Execution Refusal Mechanism"
    status: COMPLETED
    details: |
      DENY format with required_changes:
      - decision: "DENY"
      - reason: "Intent Not Buildable"
      - required_changes: List of specific issues
      - Each change has: issue_key, reason, fix_kind, evidence_needed, next_action

      Fail-closed behavior:
      - Default: DENY
      - No execution without valid intent
      - All refusals logged with evidence

  - id: IC-T100-004
    description: "Token Savings Mechanism"
    status: COMPLETED
    details: |
      Early rejection saves tokens by:
      1. Validating intent before execution phase
      2. Rejecting unbuildable intents at validation stage
      3. Preventing downstream computation for invalid requests
      4. Logging rejection metrics for analysis

