      - "Make network calls"
      - "Access databases"
      - "Trigger side effects"
    output: "Suggestions only - NO system state changes"
    isolation: "COMPLETE - No contamination of execution window"

  execution_window:
    purpose: "System actions with validated intent"
    allowed_actions:
      - "Execute approved commands"
      - "Modify allowed files"
      - "Generate artifacts"
      - "Create evidence"
    preconditions:
