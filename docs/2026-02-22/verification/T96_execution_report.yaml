## Section 1: Unified Semantics Definition (统一语义定义)

unified_semantics_definition:
  overview: |
    Three reset semantics unified under single contract framework.
    Each semantic has distinct behavior, compatibility boundary, and fail-closed policy.

  semantics:
    iterate:
      definition: "Incremental update preserving full history"
      behavior:
        - "Creates new checkpoint on each change"
        - "Maintains complete audit trail"
        - "Supports rollback to any historical checkpoint"
      use_cases:
        - "Version increment"
        - "Configuration hot-update"
        - "Incremental data migration"
      handler_class: "IterateHandler"
      checkpoint_policy: "CREATE_NEW"

    rollback_reset:
      definition: "Restore to previously confirmed stable state"
      behavior:
        - "Requires valid checkpoint to exist"
        - "Verifies checkpoint integrity before restore"
        - "Preserves rollback record for audit"
      use_cases:
        - "Failure recovery"
        - "Error reversion"
        - "Disaster recovery"
      handler_class: "RollbackResetHandler"
      checkpoint_policy: "RESTORE_EXISTING"

    rebase_reset:
      definition: "Rebuild state based on new baseline"
      behavior:
        - "Discards local uncommitted changes"
        - "Uses remote/baseline version as source of truth"
        - "Records rebase source and timestamp"
      use_cases:
        - "Sync with remote changes"
        - "Merge conflict resolution"
        - "State synchronization"
      handler_class: "RebaseResetHandler"
      checkpoint_policy: "REPLACE_WITH_BASE"

## Section 2: Compatibility/Incompatibility Boundaries (兼容/不兼容边界)

compatibility_boundaries:
  overview: |
    Each reset type defines explicit compatibility boundaries.
    Operations crossing incompatible boundaries are DENIED.
    Operations requiring approval return REQUIRES_APPROVAL.

  iterate_boundaries:
    compatible:
      - "incremental_change: Small, additive modifications"
      - "config_update: Configuration parameter changes"
      - "version_increment: Minor version bumps"
    incompatible:
      - "destructive_deletion: Data loss operations"
      - "schema_breaking_change: Incompatible schema changes"
      - "invalid_state_transition: State machine violations"
    requires_approval:
      - "major_version_change: Major version bumps"
      - "security_sensitive_update: Security-related changes"

  rollback_reset_boundaries:
    compatible:
      - "valid_checkpoint_exists: Target checkpoint is valid"
      - "state_recoverable: State can be recovered"
    incompatible:
      - "checkpoint_not_found: Target checkpoint missing"
      - "checkpoint_corrupted: Checkpoint integrity failed"
      - "version_incompatible: Checkpoint from incompatible version"
    requires_approval:
      - "rollback_across_major_version: Rolling back across major versions"

  rebase_reset_boundaries:
    compatible:
      - "base_is_newer: Baseline is newer than local"
      - "no_conflicting_dependencies: No dependency conflicts"
    incompatible:
      - "base_is_older: Baseline is older than local"
      - "base_corrupted: Baseline integrity failed"
      - "dependency_conflict: Unresolved dependency conflicts"
    requires_approval:
      - "destructive_rebase: Rebase that discards significant work"
      - "rebase_with_uncommitted_work: Rebase with pending changes"

## Section 3: Fail-Closed Strategy (Fail-Closed 策略)

fail_closed_strategy:
  overview: |
    All validation failures result in DENY. No partial acceptance.
    System fails to a closed (safe) state on any error.

  principles:
    - id: FC-001
      principle: "Default DENY"
      description: "Any operation not explicitly ALLOWED is DENIED"
      enforcement: "All handlers return ResetValidationResult.DENY by default"
    - id: FC-002
      principle: "Precondition Required"
      description: "Missing preconditions result in immediate DENY"
      enforcement: "validate_preconditions() must return (True, []) before execution"
    - id: FC-003
      principle: "Integrity Verification"
      description: "Failed integrity checks result in DENY"
      enforcement: "Checkpoint.verify_integrity() must pass"
    - id: FC-004
      principle: "No Silent Failures"
      description: "All failures must produce explicit error code and message"
      enforcement: "ResetOperationResult.error_code and error_message required on failure"
    - id: FC-005
      principle: "Rollback on Failure"
      description: "Failed operations must not leave system in inconsistent state"
      enforcement: "checkpoint_before preserved for recovery"

  enforcement_points:
    - location: "ConsistencyContractValidator.validate_before_change()"
      behavior: "Returns (False, violations) on any invariant violation"
    - location: "ConsistencyContractValidator.enforce_or_fail()"
      behavior: "Throws ContractViolationError on validation failure"
    - location: "ResetSemanticsHandler.can_execute()"
      behavior: "Returns DENY for unknown or incompatible operations"
    - location: "ResetSemanticsHandler.execute()"
      behavior: "Returns ResetOperationResult(success=False) on any failure"
    - location: "ResetSemanticsRegistry.execute_reset()"
      behavior: "Returns DENY result for unknown reset types"

  error_codes:
    - code: "PRECONDITION_FAILED"
      description: "Required preconditions not met"
      severity: "ERROR"
    - code: "INCOMPATIBLE_OPERATION"
      description: "Operation denied by compatibility boundary"
      severity: "ERROR"
    - code: "CHECKPOINT_CORRUPTED"
      description: "Checkpoint integrity verification failed"
      severity: "CRITICAL"
    - code: "CHECKPOINT_NOT_FOUND"
      description: "Target checkpoint does not exist"
      severity: "ERROR"
    - code: "EXECUTION_FAILED"
      description: "Execution failed, system rolled back"
      severity: "ERROR"
    - code: "UNKNOWN_RESET_TYPE"
      description: "Reset type not recognized"
      severity: "CRITICAL"
    - code: "CONTRACT_VIOLATION"
      description: "Invariant or constraint violated"
      severity: "CRITICAL"

