# Gate 规则验证
gate_rule_verification:
  rule: "通过条件=回滚与恢复都可复现且有前后状态证据，任一步失败即 DENY"
  checks:
    - name: "回滚可复现"
      status: "PASS"
      evidence: "run_rollback_drill.py 支持多次执行"
    - name: "恢复可复现"
      status: "PASS"
      evidence: "phase_5_verify_recovery() 验证前后状态一致"
    - name: "前后状态证据"
      status: "PASS"
      evidence: "pre_state 和 post_state SHA256 快照"
    - name: "任一步失败即 DENY"
      status: "PASS"
      evidence: "DrillError 异常处理 + 返回码 1"

# A/B Guard 实现摘要
guard_implementation:
  a_guard:
    - "ExecutionContract 完整定义（inputs/outputs/controls/roles）"
    - "三角色显式存在（execution/review/compliance）"
    - "验收测试映射到 evidence_requirements"
    - "side_effects 显式声明"

  b_guard:
    - "simulation_mode 默认开启，防止生产影响"
    - "备份验证后才允许回滚"
    - "EvidenceRef 必须包含 SHA256"
    - "Compliance 签署后才能标记完成"

# 演练执行器功能
executor_features:
  drill_types:
    - "DATA_CORRUPTION: 数据损坏模拟"
    - "SCHEMA_INCOMPATIBLE: Schema 版本不兼容"
    - "CODE_BUG: 代码逻辑错误"
    - "FULL_ROLLBACK: 完整回滚演练"

  phases:
    - "Phase 1: 状态快照 (pre_state SHA256)"
    - "Phase 2: 备份原始文件"
    - "Phase 3: 故障模拟"
    - "Phase 4: 执行回滚"
    - "Phase 5: 验证恢复 (post_state SHA256 对比)"

  outputs:
    - "rollback_tombstone.json: 回滚墓碑记录"
    - "rollback_drill.md: 演练文档"
    - "execution_report.yaml"
    - "gate_decision.json"
    - "compliance_attestation.json"

# 三角色协作
three_powers:
  execution:
    role: "Kior-B"
    responsibilities:
      - "执行备份操作"
      - "执行故障模拟"
      - "执行回滚恢复"
      - "生成 tombstone 记录"
    forbidden:
      - "network_request"
      - "production_modify"
      - "delete_without_backup"

  review:
    role: "vs--cc3"
    responsibilities:
      - "检查演练范围合理性"
      - "验证备份完整性"
      - "确认恢复证据链完整"
    checks:
      - "pre_state_snapshot_exists"
      - "post_state_matches_pre"
      - "tombstone_complete"

  compliance:
    role: "Kior-C"
    responsibilities:
      - "验证无生产影响"
      - "验证备份保留完整"
      - "验证系统稳定性"
    must_follow: "docs/EXECUTION_GUARD_B_EXECUTION_SKILL_v1.md"

# Gate 自检结果
gate_self_check:
  - command: "python skills/rollback-drill-skill/run_rollback_drill.py --help"
    result: "OK - 显示帮助信息"

  - command: "python skills/rollback-drill-skill/run_rollback_drill.py --verify --tombstone docs/2026-02-22/verification/rollback_tombstone.json"
    result: "OK - Tombstone 验证通过"

  - command: "回滚与恢复可复现检查"
    result: "OK - 脚本支持重复执行"

  - command: "前后状态证据检查"
    result: "OK - pre_state/post_state SHA256 记录"

# 失败码定义
error_codes:
  - code: "SF_DRILL_BACKUP_FAILED"
    meaning: "备份创建失败"
    action: "DENY, 检查磁盘空间"

  - code: "SF_DRILL_CORRUPT_FAILED"
    meaning: "故障模拟失败"
    action: "DENY, 检查文件权限"

  - code: "SF_DRILL_ROLLBACK_FAILED"
    meaning: "回滚执行失败"
    action: "DENY, 检查备份完整性"

  - code: "SF_DRILL_VERIFY_FAILED"
    meaning: "恢复验证失败"
    action: "DENY, 文件指纹不匹配"

  - code: "SF_DRILL_PRODUCTION_IMPACT"
    meaning: "检测到生产影响"
    action: "DENY, 立即停止"

# 备注
notes: |
  Rollback Drill Skill 实现：

  1. SKILL.md 定义了完整的 ExecutionContract
