validation_logic_summary: |
  1. validateAuditReport(data) 校验:
     - 检查 data 是否为对象
     - 检查 summary 必需字段: run_date, generated_at, profile, policy_version, policy_path, scope, run_id, evidence_ref, input_hash, sample_size, gate_counts, avg_overall_score, avg_est_tokens, result_hash
     - 检查 gate_counts.PASS/WARN/FAIL
     - 检查 results 数组每个项的必需字段
     - 检查 layer_scores.L1-L5
     - 检查 layer_status.L1-L5 必须是 PASS/WARN/FAIL
     - 检查 gate 必须是 PASS/WARN/FAIL

  2. formatValidationErrors(errors) 生成可读错误:
     - 单错误: "数据格式错误: {path} - {message}"
     - 多错误: "数据格式错误 (N 项): {path1}: {msg1}; {path2}: {msg2}..."

  3. 加载时校验 (line 651):
     - rawData 先经过 validateAuditReport()
     - 若 valid=false，抛出格式化后的错误
     - 错误在 UI 显示为 "加载失败: {error}"

