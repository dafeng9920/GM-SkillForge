# 校验链数据结构
chain_structure:
  genesis_block:
    description: "链起点，包含合规官签名"
    fields: ["hash", "created_at", "signed_by"]

  evidence_entry:
    description: "证据链节点"
    fields:
      - name: "index"
        type: "integer"
        description: "节点序号"
      - name: "evidence_id"
        type: "string"
        description: "证据唯一标识 (EV-XXXX)"
      - name: "evidence_path"
        type: "string"
        description: "证据文件路径"
      - name: "evidence_sha256"
        type: "string"
        description: "证据文件 SHA256 哈希"
      - name: "chain_hash"
        type: "string"
        description: "链节点哈希（包含前节点哈希）"
      - name: "prev_hash"
        type: "string"
        description: "前一节点 chain_hash"
      - name: "timestamp"
        type: "ISO8601"
        description: "创建时间戳"
      - name: "metadata"
        type: "object"
        description: "可选元数据"

# 备注
notes: |
  实现了完整的 evidence_sha256 交叉校验链：

  1. 链式结构：每个节点的 prev_hash 指向前一节点的 chain_hash
  2. 双重哈希：evidence_sha256（文件哈希）+ chain_hash（节点哈希）
  3. 完整性校验：validate_chain() 检查链链接完整性
  4. 存在性校验：verify_evidence_existence() 检查文件存在且哈希匹配
  5. 自动发现：--add-dir 可批量添加目录下的证据文件

  脚本支持独立运行，无外部网络依赖。
