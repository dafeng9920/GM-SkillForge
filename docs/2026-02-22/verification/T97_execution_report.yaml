## Failure Cases

failure_cases:
  - case_id: "FC-T97-001"
    type: "INVALID_GATE_DECISION"
    file: "contract_tests/invalid_examples/gate_decision_invalid_1.json"
    description: "Gate decision with invalid decision value and malformed fields"
    invalid_fields:
      - field: "gate_id"
        value: "not-a-uuid"
        expected: "UUID format"
      - field: "decision"
        value: "INVALID_DECISION"
        expected: "ALLOW | DENY | REQUIRES_CHANGES"
      - field: "decided_at"
        value: "invalid-date"
        expected: "ISO 8601 datetime"
    required_changes:
      - "gate_id must be valid UUID"
      - "decision must be one of ALLOW/DENY/REQUIRES_CHANGES"
      - "decided_at must be ISO 8601 format"

  - case_id: "FC-T97-002"
    type: "INCOMPLETE_AUDIT_PACK"
    file: "contract_tests/invalid_examples/audit_pack_invalid_1.json"
    description: "Audit pack missing required fields"
    missing_fields:
      - "skill_id"
      - "skill_version"
      - "manifest"
      - "license_status"
    required_changes:
      - "Add skill_id field"
      - "Add skill_version field"
      - "Add manifest object"
      - "Add license_status field"

  - case_id: "FC-T97-003"
    type: "INVALID_TRACE_EVENT"
    file: "contract_tests/invalid_examples/trace_event_invalid_1.json"
    description: "Trace event with invalid event_type"
    invalid_fields:
      - field: "event_type"
        value: "invalid_type"
        expected: "node_start | node_complete | node_error"
    required_changes:
      - "event_type must be valid enum value"

  - case_id: "FC-T97-004"
    type: "GATE_DENY_BLOCKING"
    description: "Constitution gate DENY blocks pipeline execution"
    trigger:
      - "risk_score >= 0.7"
      - "robots_txt violation"
      - "authenticated_access capability"
    behavior: "Pipeline returns status=gate_denied, no further execution"
    evidence: "engine.py lines 235-246"

  - case_id: "FC-T97-005"
    type: "MISSING_INPUT_FIELD"
    description: "Missing required input field triggers validation failure"
    examples:
      - missing: "natural_language"
        when: "mode=nl"
        error: "EXEC_INVALID_INPUT"
      - missing: "repo_url"
        when: "mode=github"
        error: "EXEC_INVALID_INPUT"
      - missing: "commit_sha"
        context: "intake_repo L3 requirement"
        error: "EXEC_VALIDATION_FAILED"

