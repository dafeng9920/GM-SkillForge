### Stage 3: CONTRACT (Spec Generation with Input/Output Contracts)

contract_stage:
  description: "Generate skill specification with formal input/output contracts"

  contract_enforcement:
    - type: "input_contract"
      schema: "pipeline_input.schema.json"
      required_fields: ["mode"]
      conditional_fields:
        - when: "mode=nl"
          requires: ["natural_language"]
        - when: "mode=github"
          requires: ["repo_url"]
        - when: "mode=auto"
          requires: ["natural_language"]

    - type: "output_contract"
      schema: "pipeline_output.schema.json"
      required_fields:
        - schema_version
        - job_id
        - status
        - path_taken
        - stages_completed
        - gate_decisions
        - trace_events
        - duration_ms

    - type: "node_contracts"
      each_node_has:
        - validate_input: "function returning list of errors"
        - execute: "function returning output dict"
        - validate_output: "function returning list of errors"

  evidence_samples:
    valid_input:
      - file: "test_protocols.py::_sample_input_nl"
        sample: |
          {
            "mode": "nl",
            "natural_language": "I need an SEO audit tool",
            "branch": "main",
            "options": {
              "target_environment": "python",
              "intended_use": "automation",
              "visibility": "public",
              "sandbox_mode": "strict"
            }
          }
      - file: "test_protocols.py::_sample_input_github"
        sample: |
          {
            "mode": "github",
            "repo_url": "https://github.com/example/repo",
            "branch": "main",
            "options": {
              "target_environment": "python",
              "intended_use": "web",
              "visibility": "private",
              "sandbox_mode": "moderate"
            }
          }

    valid_output:
      - file: "test_protocols.py::_sample_output"
        sample: |
          {
            "schema_version": "0.1.0",
            "job_id": "00000000-0000-0000-0000-000000000000",
            "status": "completed",
            "path_taken": "A",
            "stages_completed": 7,
