## End-to-End Pipeline Evidence

### Stage 1: INGEST (Source Acquisition)

ingest_stage:
  description: "Acquire input source - either natural language description or GitHub repository"

  path_a_nodes:
    - node_id: "intent_parse"
      file: "skillforge-spec-pack/skillforge/src/nodes/intent_parser.py"
      input_contract:
        natural_language: "string (required)"
        options: "object"
      output_contract:
        schema_version: "0.1.0"
        intent:
          goal: "string"
          domain: "string"
          actions: "list[string]"
          constraints: "list[string]"
          target_environment: "string"
          intended_use: "string"
        confidence: "float (0.0-1.0)"
        raw_input: "string"
      validation: "validate_input checks natural_language presence; validate_output checks schema"

  path_b_nodes:
    - node_id: "intake_repo"
      file: "skillforge-spec-pack/skillforge/src/nodes/intake_repo.py"
      input_contract:
        repo_url: "string (required)"
        branch: "string (default: main)"
        commit_sha: "string (required for L3)"
        options: "object"
      output_contract:
        schema_version: "0.1.0"
        repo_info:
          name: "string"
          owner: "string"
          default_branch: "string"
          stars: "integer"
          license: "string | null"
          last_commit_sha: "string"
          languages: "dict"
        fetch_status: "ok | error"
        local_path: "string | null"
      validation: "validate_input checks repo_url format; validate_output checks required fields"

  evidence_sample:
    path: "skillforge-spec-pack/orchestration/examples/tech_seo_audit/stage0_intake_repo.json"
    verified: true

### Stage 2: PARSE (Structure Analysis)

parse_stage:
  description: "Analyze input structure - strategy selection, repository scanning, spec drafting"

  path_a_nodes:
    - node_id: "source_strategy"
      file: "skillforge-spec-pack/skillforge/src/nodes/source_strategy.py"
      purpose: "Determine generation strategy (repo vs generated)"
    - node_id: "skill_compose"
      file: "skillforge-spec-pack/skillforge/src/nodes/skill_composer.py"
      input_contract:
        intent: "object from intent_parse"
        generation_hints: "object | null"
        options: "object"
      output_contract:
        schema_version: "0.1.0"
        skill_spec:
          name: "string"
          version: "string"
          description: "string"
          inputs: "list[dict]"
          outputs: "list[dict]"
          tools_required: "list[string]"
          steps: "list[dict]"
          constraints: "list[string]"
        source: "generated"
        confidence: "float"

  path_b_nodes:
    - node_id: "repo_scan_fit_score"
      file: "skillforge-spec-pack/skillforge/src/nodes/repo_scan.py"
      purpose: "Detect language stack, entry points, dependencies"
      output_contract:
        entry_points: "list[string]"
        language_stack: "string"
        fit_score: "integer (0-100)"
    - node_id: "draft_skill_spec"
      file: "skillforge-spec-pack/skillforge/src/nodes/draft_spec.py"
      input_contract:
        repo_info: "object from intake_repo"
        scan_result: "object from repo_scan"
        options: "object"
      output_contract:
        schema_version: "0.1.0"
        skill_spec: "same structure as skill_compose"
        source: "repo"
        derived_from:
          repo_url: "string"
          commit_sha: "string"
        confidence: "float"

  evidence_sample:
