intent_name: trend_following
intent_version: "1.0.0"
description: |
  基于双移动平均线交叉和ATR跟踪止损的趋势跟踪策略。
  适用于明确趋势市场，通过MA Crossover识别趋势方向，
  通过ATR动态设置止损止盈控制风险。

source_doc_ref: "D:\\NEW-GM\\strategies\\template_trend_following.py"
evidence_ref: "EVID-A5-001"

# Input Schema
input_schema:
  type: object
  name: MarketData
  required:
    - open
    - high
    - low
    - close
    - volume
  properties:
    open:
      type: array
      description: 开盘价序列
    high:
      type: array
      description: 最高价序列
    low:
      type: array
      description: 最低价序列
    close:
      type: array
      description: 收盘价序列
    volume:
      type: array
      description: 成交量序列
  indicators_required:
    - name: fast_ma
      type: series
      description: 快速移动平均线
      default_period: 10
      source_ref: "Line 64"
    - name: slow_ma
      type: series
      description: 慢速移动平均线
      default_period: 30
      source_ref: "Line 65"
    - name: atr
      type: series
      description: 平均真实波幅
      default_period: 14
      source_ref: "Lines 47-56"

# Output Schema
output_schema:
  type: object
  name: Signal
  properties:
    signal_type:
      type: string
      enum: [LONG, SHORT, FLAT]
      description: 信号类型
    confidence:
      type: float
      range: [0.0, 1.0]
      description: 信号置信度
    stop_loss:
      type: float
      description: 止损价格
      formula: "close - atr * stop_loss_atr_multiplier"
      source_ref: "Line 103"
    take_profit:
      type: float
      description: 止盈价格
      formula: "close + atr * take_profit_atr_multiplier"
      source_ref: "Line 104"
    trend_strength:
      type: float
      description: 趋势强度指标
      source_ref: "Line 69"
    momentum:
      type: float
      description: 动量指标
      source_ref: "Line 75"

# Core Logic Mapping
core_logic:
  ma_crossover:
    description: 移动平均线交叉逻辑
    source_ref: "Lines 64-96"
    evidence_ref: "EVID-A5-002"
    buy_condition:
      - condition: "ma_spread > trend_threshold"
        description: "快线显著高于慢线"
      - condition: "trend_strength > trend_threshold * 0.5"
        description: "趋势强度确认"
      - condition: "momentum > 0"
        description: "动量确认"
      - condition: "volume_ratio > 1.2"
        description: "成交量确认（可选）"
    sell_condition:
      - condition: "ma_spread < -trend_threshold"
        description: "快线显著低于慢线"
      - condition: "trend_strength < -trend_threshold * 0.5"
        description: "负趋势强度"
      - condition: "momentum < 0"
        description: "负动量"
      - condition: "volume_ratio > 1.2"
        description: "成交量确认（可选）"

  atr_trailing_stop:
    description: ATR跟踪止损逻辑
    source_ref: "Lines 47-56, 102-104"
    evidence_ref: "EVID-A5-003"
    calculation:
      true_range: "max(high-low, |high-prev_close|, |low-prev_close|)"
      atr: "rolling_mean(true_range, atr_period)"
    application:
      stop_loss: "close - atr * stop_loss_atr"
      take_profit: "close + atr * take_profit_atr"

# Strategy Parameters
parameters:
  fast_ma_period:
    type: integer
    default: 10
    range: [5, 50]
    description: 快速移动平均周期
    source_ref: "Line 28"
  slow_ma_period:
    type: integer
    default: 30
    range: [10, 200]
    description: 慢速移动平均周期
    source_ref: "Line 29"
  trend_threshold:
    type: float
    default: 0.02
    range: [0.01, 0.10]
    description: 趋势阈值
    source_ref: "Line 30"
  volume_confirmation:
    type: boolean
    default: true
    description: 是否启用成交量确认
    source_ref: "Line 31"
  atr_period:
    type: integer
    default: 14
    range: [5, 50]
    description: ATR计算周期
    source_ref: "Line 32"
  stop_loss_atr:
    type: float
    default: 2.0
    range: [1.0, 5.0]
    description: 止损ATR倍数
    source_ref: "Line 33"
  take_profit_atr:
    type: float
    default: 4.0
    range: [2.0, 10.0]
    description: 止盈ATR倍数
    source_ref: "Line 34"

# Evidence Requirements
evidence_required:
  - type: BacktestRef
    description: 模拟回测引用
    required_metrics:
      - total_return
      - annual_return
      - max_drawdown
      - sharpe_ratio
      - win_rate
      - total_trades
    backtest_function_ref: "Lines 169-259"
  - type: ValidationRef
    description: 策略验证结果
    validation_method: "validate_strategy()"
    source_ref: "Lines 121-166"

# Gate Requirements
gate_requirements:
  pre_conditions:
    - data_completeness: "OHLCV data must be complete"
    - minimum_data_points: "At least slow_ma_period + atr_period data points required"
  post_conditions:
    - signal_validity: "Signal must be one of LONG/SHORT/FLAT"
    - stop_loss_sanity: "stop_loss < close for LONG, stop_loss > close for SHORT"

# Migration Target
