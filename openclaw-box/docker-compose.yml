version: '3.8'

services:
  openclaw-db:
    image: postgres:15-alpine
    container_name: openclaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawuser
      POSTGRES_PASSWORD: clawpassword
      POSTGRES_DB: openclaw
    volumes:
      - openclaw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawuser -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw-agent:
    build: .
    container_name: openclaw_core
    restart: unless-stopped
    depends_on:
      openclaw-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - ZAI_API_KEY=${OPENAI_API_KEY}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - LARK_APP_ID=${LARK_APP_ID}
      - LARK_APP_SECRET=${LARK_APP_SECRET}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_BASE_URL=${OPENAI_API_BASE}
    ports:
      - "18789:18789" # OpenClaw Dashboard
    volumes:
      - ./data:/root/.openclaw # Persist Agent configuration and local files
      - ./data/logs:/tmp/openclaw # Expose logs for SkillForge monitoring
    working_dir: /app


volumes:
  openclaw_pgdata:
