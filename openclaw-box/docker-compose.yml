version: '3.8'

services:
  openclaw-db:
    image: postgres:15-alpine
    container_name: openclaw_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawuser
      POSTGRES_PASSWORD: clawpassword
      POSTGRES_DB: openclaw
    volumes:
      - openclaw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawuser -d openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw-agent:
    # We use the official node image to run the npm install and start the daemon
    # This ensures maximum compatibility with the CLI
    image: node:22-bookworm-slim
    container_name: openclaw_core
    restart: unless-stopped
    depends_on:
      openclaw-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=production
      - ZAI_API_KEY=${ZAI_API_KEY}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
    ports:
      - "18789:18789" # OpenClaw Dashboard
    volumes:
      - ./data:/root/.openclaw # Persist Agent configuration and local files
      - ./data/logs:/tmp/openclaw # Expose logs for SkillForge monitoring
    working_dir: /app
    # The entrypoint installs openclaw globally and starts the daemon
    command: >
      sh -c "
      if [ ! -f /usr/local/bin/openclaw ]; then
        apt-get update && apt-get install -y git python3 build-essential cmake &&
        npm config set registry https://registry.npmmirror.com &&
        npm install -g openclaw@latest
      fi &&
      echo 'Starting OpenClaw...' &&
      openclaw gateway run --port 18789 --allow-unconfigured --bind lan
      "

volumes:
  openclaw_pgdata:
